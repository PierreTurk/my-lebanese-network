const DIASPORA=["France","United States","Brazil","Canada","Australia","Germany","United Kingdom","UAE","Argentina","Mexico","Ivory Coast","Nigeria","Saudi Arabia","Sweden","Senegal","Colombia","Venezuela","Chile","Belgium","Switzerland","Italy","Spain","Greece","Cyprus","Kuwait","Qatar","Bahrain","Jordan","Egypt","South Africa","New Zealand","Japan","China","Singapore","Hong Kong"];

function HomePage({onEnter,onSignup}){
  const [wi,setWi]=useState(0),[vis,setVis]=useState(true);
  const canvasRef=useRef(null),animRef=useRef(null);
  useEffect(()=>{
    const iv=setInterval(()=>{setVis(false);setTimeout(()=>{setWi(i=>(i+1)%DIASPORA.length);setVis(true);},300)},1700);
    return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d"),W=c.offsetWidth,H=c.offsetHeight;
    c.width=W;c.height=H;
    const pts=DIASPORA.map(n=>({n,x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1.5,a:Math.random()*.45+.3,ph:Math.random()*Math.PI*2}));
    function draw(t){
      ctx.clearRect(0,0,W,H);
      pts.forEach((p,i)=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<-90)p.x=W+90;if(p.x>W+90)p.x=-90;
        if(p.y<-40)p.y=H+40;if(p.y>H+40)p.y=-40;
        const pulse=.7+.3*Math.sin(t/1000+p.ph),a=p.a*pulse;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(185,28,28,${a})`;ctx.fill();
        ctx.beginPath();ctx.arc(p.x,p.y,p.r+4,0,Math.PI*2);ctx.fillStyle=`rgba(185,28,28,${a*.12})`;ctx.fill();
        ctx.font="500 10.5px Inter,system-ui";ctx.fillStyle=`rgba(92,26,26,${a*.8})`;ctx.fillText(p.n,p.x+p.r+5,p.y+4);
        pts.forEach((q,j)=>{if(j<=i)return;const dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(185,28,28,${(1-d/110)*.1})`;ctx.lineWidth=.5;ctx.stroke();}});
      });
      animRef.current=requestAnimationFrame(draw);
    }
    animRef.current=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(animRef.current);
  },[]);
  return(
    <div className="home-wrap">
      <div className="home-flag"/>
      <canvas ref={canvasRef}/>
      <div className="home-watermark">🌲</div>
      <div style={{position:"relative",textAlign:"center",padding:"0 24px",maxWidth:680,zIndex:1}}>
        <div className="home-tag">My Lebanese Network</div>
        <h1 className="home-h1">Who are the Lebanese<br/>in <span className={`home-country${vis?"":" hidden"}`}>{DIASPORA[wi]}</span> ?</h1>
        <p className="home-p">The Lebanese are everywhere. MLN is the place to find them, wherever you are, whatever you do.</p>
        <div className="home-btns">
          <button className="home-btn-primary" onClick={onEnter}>Explore the network →</button>
          <button className="home-btn-secondary" onClick={onSignup}>Log in / Join</button>
        </div>
        <div className="home-stats">
          {[["🌍","35+ countries"],["👥","Growing community"],["🌲","Lebanese roots"],["🤝","For every Lebanese"]].map(([ic,lb])=>(
            <div key={lb} className="home-stat"><div style={{fontSize:22}}>{ic}</div><div className="home-stat-label">{lb}</div></div>
          ))}
        </div>
      </div>
      <div className="home-flag-bottom"/>
    </div>
  );
}

function AuthScreen({onAuthed,onClose}){
  const [mode,setMode]=useState("login"),[email,setEmail]=useState(""),[pw,setPw]=useState(""),[remember,setRemember]=useState(true),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
  async function submit(){
    setErr("");setLoading(true);
    try{
      if(mode==="signup"){
        const{data,error}=await supabase.auth.signUp({email,password:pw});
        if(error)throw error;
        onAuthed(data.user);
      }else{
        const opts=remember?{}:{options:{persistSession:false}};
        const{data,error}=await supabase.auth.signInWithPassword({email,password:pw,...opts});
        if(error)throw error;
        onAuthed(data.user);
      }
    }catch(e){setErr(e.message||"Something went wrong");}
    finally{setLoading(false);}
  }
  return(
    <div className="modal-bg">
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div><div className="modal-title">{mode==="signup"?"Create your account":"Welcome back"}</div><div className="modal-sub">My Lebanese Network</div></div>
          <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-3)"}} onClick={onClose}>✕</button>
        </div>
        <div className="form-row"><label className="form-label">Email</label><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        <div className="form-row"><label className="form-label">Password</label><input className="inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="At least 6 characters" onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        {mode==="login"&&(
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,cursor:"pointer"}} onClick={()=>setRemember(!remember)}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${remember?"var(--red)":"var(--border-2)"}`,background:remember?"var(--red)":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {remember&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
            </div>
            <span style={{fontSize:13,color:"var(--text-2)"}}>Remember me</span>
          </div>
        )}
        {err&&<div style={{background:"var(--red-light)",color:"var(--red)",padding:"8px 12px",borderRadius:8,fontSize:12,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary btn-full" disabled={loading} onClick={submit} style={{marginBottom:14}}>{loading?"Please wait…":mode==="signup"?"Create account →":"Log in →"}</button>
        <div style={{textAlign:"center",fontSize:12,color:"var(--text-3)"}}>
          {mode==="signup"?"Already have an account? ":"New here? "}
          <span style={{color:"var(--red)",fontWeight:600,cursor:"pointer"}} onClick={()=>setMode(mode==="signup"?"login":"signup")}>{mode==="signup"?"Log in":"Sign up"}</span>
        </div>
      </div>
    </div>
  );
}

function PhotoUpload({preview,onChange,uploading}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,marginBottom:20}}>
      {preview?<img src={preview} alt="preview" style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:"2px solid var(--border-2)"}}/>
      :<div style={{width:80,height:80,borderRadius:"50%",background:"var(--stone)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:"var(--text-3)"}}>📷</div>}
      <label className="btn btn-sm" style={{cursor:"pointer"}}>{uploading?"Uploading…":"Choose photo"}<input type="file" accept="image/*" style={{display:"none"}} onChange={onChange}/></label>
    </div>
  );
}

function App(){
  const [session,setSession]=useState(null);
  const [profiles,setProfiles]=useState([]);
  const [myProfile,setMyProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [hasSeenHome,setHasSeenHome]=useState(false);
  const [page,setPage]=useState("home");
  const [viewProfile,setViewProfile]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const [filterCountry,setFilterCountry]=useState("All countries");
  const [filterIndustry,setFilterIndustry]=useState("All industries");
  const [filterLived,setFilterLived]=useState(false);
  const [groupFilter,setGroupFilter]=useState("All");
  const [toast,setToast]=useState(null);
  const [showAuth,setShowAuth]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [showEdit,setShowEdit]=useState(false);
  const [showContact,setShowContact]=useState(null);
  const [showReport,setShowReport]=useState(null);
  const [showConnections,setShowConnections]=useState(false);
  const [showEndorsed,setShowEndorsed]=useState(false);
  const [connections,setConnections]=useState([]);
  const [endorsements,setEndorsements]=useState([]);
  const [blocks,setBlocks]=useState([]);
  const [activeChat,setActiveChat]=useState(null);
  const [messages,setMessages]=useState([]);
  const [msgInput,setMsgInput]=useState("");
  const [msgTs,setMsgTs]=useState([]);
  const [modWarn,setModWarn]=useState(null);
  const [unread,setUnread]=useState({});
  const [liveStats,setLiveStats]=useState({requests:0,accepted:0,messages:0});
  const [photoFile,setPhotoFile]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [discoverMode,setDiscoverMode]=useState("all");
  const [feedbackText,setFeedbackText]=useState("");
  const [feedbackType,setFeedbackType]=useState("Feedback");
  const [feedbackSent,setFeedbackSent]=useState(false);
  const [form,setForm]=useState({firstName:"",lastName:"",role:"",company:"",country:"",city:"",livedLebanon:false,bio:"",languages:"",industry:"Finance & Banking",shareEmail:false,sharePhone:false,phone:"",visibleIn:["world","pro","social"],sameProfileBoth:true,socialBio:"",socialInterests:"",socialLookingFor:""});
  const [editForm,setEditForm]=useState({});
  const msgEnd=useRef(null);

  function notify(msg){setToast(msg);setTimeout(()=>setToast(null),2800);}

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setSession(session);
    });
    const{data:l}=supabase.auth.onAuthStateChange((_,s)=>{
      setSession(s);
    });
    return()=>l.subscription.unsubscribe();
  },[]);

  async function loadProfiles(){
    setLoading(true);
    const{data}=await supabase.from("profiles").select("*").order("created_at",{ascending:false});
    if(data)setProfiles(data);
    setLoading(false);
  }
  useEffect(()=>{loadProfiles();},[]);

  // Only resolve myProfile once BOTH session AND profiles are loaded
  useEffect(()=>{
    if(loading)return; // wait for profiles to finish loading
    if(!session?.user){setMyProfile(null);return;}
    const mine=profiles.find(p=>p.user_id===session.user.id);
    setMyProfile(mine||null);
  },[session,profiles,loading]);

  async function loadRelations(){
    const[c,e,b]=await Promise.all([supabase.from("connections").select("*"),supabase.from("endorsements").select("*"),supabase.from("blocks").select("*")]);
    if(c.data)setConnections(c.data);
    if(e.data)setEndorsements(e.data);
    if(b.data)setBlocks(b.data);
  }
  useEffect(()=>{loadRelations();},[]);

  async function loadStats(){
    const[r,a,m]=await Promise.all([
      supabase.from("interaction_events").select("id",{count:"exact",head:true}).eq("event_type","request_sent"),
      supabase.from("interaction_events").select("id",{count:"exact",head:true}).eq("event_type","request_accepted"),
      supabase.from("interaction_events").select("id",{count:"exact",head:true}).eq("event_type","first_message"),
    ]);
    setLiveStats({requests:r.count||0,accepted:a.count||0,messages:m.count||0});
  }
  useEffect(()=>{
    loadStats();
    const ch=supabase.channel("stats_live").on("postgres_changes",{event:"INSERT",schema:"public",table:"interaction_events"},()=>loadStats()).subscribe();
    return()=>supabase.removeChannel(ch);
  },[]);
  async function logEvent(type){await supabase.from("interaction_events").insert({event_type:type});}

  async function loadMessages(otherId){
    if(!myProfile||!otherId)return;
    const{data}=await supabase.from("messages").select("*")
      .or(`and(from_id.eq.${myProfile.id},to_id.eq.${otherId}),and(from_id.eq.${otherId},to_id.eq.${myProfile.id})`)
      .order("created_at",{ascending:true});
    if(data)setMessages(data);
  }
  useEffect(()=>{if(activeChat)loadMessages(activeChat);},[activeChat,myProfile]);
  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  useEffect(()=>{
    if(!myProfile)return;
    const ch=supabase.channel("msg_live_"+myProfile.id)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},(payload)=>{
        const m=payload.new;
        const isMe=m.to_id===myProfile.id,isMine=m.from_id===myProfile.id;
        if(!isMe&&!isMine)return;
        const other=isMe?m.from_id:m.to_id;
        if(activeChat===other)setMessages(prev=>prev.some(x=>x.id===m.id)?prev:[...prev,m]);
        if(isMe&&activeChat!==m.from_id){
          setUnread(prev=>({...prev,[m.from_id]:(prev[m.from_id]||0)+1}));
          const s=profiles.find(p=>p.id===m.from_id);
          notify(`✉️ New message from ${s?s.name.split(" ")[0]:"someone"}`);
        }
      }).subscribe();
    return()=>supabase.removeChannel(ch);
  },[myProfile,activeChat,profiles]);

  function openChat(id){setActiveChat(id);setUnread(prev=>{const n={...prev};delete n[id];return n;});}

  async function uploadPhoto(file,userId){
    setUploading(true);
    try{
      const ext=file.name.split(".").pop(),path=`${userId}-${Date.now()}.${ext}`;
      const{error}=await supabase.storage.from("avatars").upload(path,file,{upsert:true});
      if(error){notify("Photo upload failed");return null;}
      const{data}=supabase.storage.from("avatars").getPublicUrl(path);
      return data.publicUrl;
    }finally{setUploading(false);}
  }
  function onPhotoSelect(e){
    const f=e.target.files?.[0];if(!f)return;
    if(f.size>5*1024*1024){notify("Photo must be under 5MB");return;}
    setPhotoFile(f);setPhotoPreview(URL.createObjectURL(f));
  }

  async function createProfile(){
    if(!form.firstName.trim()||!form.lastName.trim())return alert("Please enter first and last name.");
    if(!session?.user)return setShowAuth(true);
    const fullName=`${form.firstName.trim()} ${form.lastName.trim()}`;
    const pair=COLOR_PAIRS[profiles.length%COLOR_PAIRS.length];
    const initials=(form.firstName[0]+form.lastName[0]).toUpperCase();
    let photo_url=null;
    if(photoFile)photo_url=await uploadPhoto(photoFile,session.user.id);
    const payload={user_id:session.user.id,name:fullName,role:form.role,company:form.company,country:form.country,city:form.city,lived_lebanon:form.livedLebanon,bio:form.bio,languages:form.languages.split(",").map(l=>l.trim()).filter(Boolean),industry:form.industry,email:session.user.email,initials,color:pair.c,bg:pair.b,photo_url,share_email:form.shareEmail,share_phone:form.sharePhone,phone:form.phone,visible_in:form.visibleIn,same_profile_both:form.sameProfileBoth,social_bio:form.sameProfileBoth?form.bio:form.socialBio,social_interests:form.socialInterests.split(",").map(s=>s.trim()).filter(Boolean),social_looking_for:form.socialLookingFor};
    const{data,error}=await supabase.from("profiles").insert(payload).select().single();
    if(error){notify("Error: "+error.message);return;}
    setMyProfile(data);setProfiles(prev=>[data,...prev]);
    setShowCreate(false);setPhotoFile(null);setPhotoPreview(null);
    setPage("myprofile");notify("Welcome to My Lebanese Network! 🌲");
  }

  async function saveEdit(){
    if(!editForm.firstName?.trim()||!editForm.lastName?.trim()||!myProfile)return;
    const fullName=`${editForm.firstName.trim()} ${editForm.lastName.trim()}`;
    const langs=typeof editForm.languages==="string"?editForm.languages.split(",").map(l=>l.trim()).filter(Boolean):editForm.languages;
    const sInterests=typeof editForm.socialInterests==="string"?editForm.socialInterests.split(",").map(s=>s.trim()).filter(Boolean):editForm.social_interests;
    const payload={name:fullName,role:editForm.role,company:editForm.company,country:editForm.country,city:editForm.city,lived_lebanon:editForm.livedLebanon??editForm.lived_lebanon,bio:editForm.bio,languages:langs,industry:editForm.industry,share_email:editForm.share_email||false,share_phone:editForm.share_phone||false,phone:editForm.phone||"",visible_in:editForm.visibleIn||["world","pro","social"],same_profile_both:editForm.sameProfileBoth??true,social_bio:editForm.sameProfileBoth?editForm.bio:editForm.social_bio||"",social_interests:sInterests||[],social_looking_for:editForm.social_looking_for||""};
    const{data,error}=await supabase.from("profiles").update(payload).eq("id",myProfile.id).select().single();
    if(error){notify("Error: "+error.message);return;}
    setMyProfile(data);setProfiles(prev=>prev.map(p=>p.id===data.id?data:p));
    setShowEdit(false);notify("Profile updated!");
  }

  async function changePhoto(e){
    const f=e.target.files?.[0];if(!f||!myProfile||!session)return;
    if(f.size>5*1024*1024){notify("Photo must be under 5MB");return;}
    const url=await uploadPhoto(f,session.user.id);
    if(url){const{data,error}=await supabase.from("profiles").update({photo_url:url}).eq("id",myProfile.id).select().single();if(!error){setMyProfile(data);setProfiles(prev=>prev.map(p=>p.id===data.id?data:p));notify("Photo updated! 📸");}}
  }

  async function deleteProfile(){
    if(!myProfile||!window.confirm("Delete your profile? This cannot be undone."))return;
    await supabase.from("profiles").delete().eq("id",myProfile.id);
    setProfiles(prev=>prev.filter(p=>p.id!==myProfile.id));
    setMyProfile(null);setShowEdit(false);setPage("discover");
  }

  async function logout(){await supabase.auth.signOut();setMyProfile(null);setHasSeenHome(false);setPage("home");}

  async function sendRequest(otherId){
    if(!myProfile)return setShowAuth(true);
    const ex=connections.find(c=>(c.user_id===myProfile.id&&c.connected_to===otherId)||(c.user_id===otherId&&c.connected_to===myProfile.id));
    if(ex){
      if(ex.status==="pending"){notify("Request already pending.");return;}
      if(ex.status==="accepted"){await supabase.from("connections").delete().eq("id",ex.id);setConnections(prev=>prev.filter(c=>c.id!==ex.id));notify("Disconnected.");}
      return;
    }
    const{data,error}=await supabase.from("connections").insert({user_id:myProfile.id,connected_to:otherId,status:"pending"}).select().single();
    if(!error){setConnections(prev=>[...prev,data]);logEvent("request_sent");notify("Request sent! 📨");}
  }

  async function respond(reqId,accept){
    const{data,error}=await supabase.from("connections").update({status:accept?"accepted":"declined"}).eq("id",reqId).select().single();
    if(!error){setConnections(prev=>prev.map(c=>c.id===reqId?data:c));if(accept){logEvent("request_accepted");notify("Connection accepted! 🤝");}else notify("Request declined.");}
  }

  async function toggleEndorse(otherId){
    if(!myProfile){notify("Please log in to endorse.");return setShowAuth(true);}
    if(!otherId){notify("Error: no profile selected.");return;}
    try{
      const ex=endorsements.find(e=>e.user_id===myProfile.id&&e.endorsed_id===otherId);
      if(ex){
        const{error}=await supabase.from("endorsements").delete().eq("id",ex.id);
        if(error){notify("Error: "+error.message);return;}
        setEndorsements(prev=>prev.filter(e=>e.id!==ex.id));
        notify("Endorsement removed.");
      }else{
        const{data,error}=await supabase.from("endorsements").insert({user_id:myProfile.id,endorsed_id:otherId}).select().single();
        if(error){notify("Error: "+error.message);return;}
        setEndorsements(prev=>[...prev,data]);
        notify("Endorsed! ⭐");
      }
    }catch(e){notify("Error: "+e.message);}
  }

  async function toggleBlock(otherId){
    if(!myProfile)return;
    const ex=blocks.find(b=>b.blocker_id===myProfile.id&&b.blocked_id===otherId);
    if(ex){await supabase.from("blocks").delete().eq("id",ex.id);setBlocks(prev=>prev.filter(b=>b.id!==ex.id));notify("User unblocked.");}
    else{const{data,error}=await supabase.from("blocks").insert({blocker_id:myProfile.id,blocked_id:otherId}).select().single();if(!error){setBlocks(prev=>[...prev,data]);notify("User blocked.");}}
  }

  async function reportUser(otherId,reason){
    if(!myProfile)return;
    await supabase.from("reports").insert({reporter_id:myProfile.id,reported_id:otherId,reason});
    notify("Report submitted.");setShowReport(null);
  }

  async function sendMsg(){
    const t=msgInput.trim();if(!t||!myProfile||!activeChat)return;
    const{ok,recent}=rateOk(msgTs);
    if(!ok){setModWarn("Sending too fast — please slow down.");setTimeout(()=>setModWarn(null),4000);return;}
    if(hasBanned(t)){setModWarn("Message blocked for inappropriate language.");setTimeout(()=>setModWarn(null),4500);return;}
    const first=messages.length===0;
    setMsgTs([...recent,Date.now()]);
    const{data,error}=await supabase.from("messages").insert({from_id:myProfile.id,to_id:activeChat,text:t}).select().single();
    if(!error){setMessages(prev=>[...prev,data]);setMsgInput("");if(first)logEvent("first_message");}
  }

  async function sendFeedback(){
    if(!feedbackText.trim())return;
    await supabase.from("feedback").insert({type:feedbackType,message:feedbackText.trim(),sender_id:myProfile?.id||null});
    setFeedbackSent(true);
  }

  // ── PROFILE COMPLETION SCORE ──
  function profileScore(p){
    if(!p)return 0;
    const checks=[p.photo_url,p.bio,p.role,p.company,p.country,p.city,p.languages?.length>0,p.industry];
    return Math.round((checks.filter(Boolean).length/checks.length)*100);
  }

  // ── PEOPLE YOU MAY KNOW ──
  function getSuggestions(){
    if(!myProfile||profiles.length===0)return[];
    return profiles
      .filter(p=>p.id!==myProfile.id&&!myConns.includes(p.id)&&!myPendingSent.includes(p.id))
      .map(p=>({...p,score:(p.country===myProfile.country?2:0)+(p.industry===myProfile.industry?2:0)+(p.lived_lebanon&&myProfile.lived_lebanon?1:0)}))
      .sort((a,b)=>b.score-a.score)
      .filter(p=>p.score>0)
      .slice(0,4);
  }
  const myConns=connections.filter(c=>(c.user_id===myProfile?.id||c.connected_to===myProfile?.id)&&c.status==="accepted").map(c=>c.user_id===myProfile?.id?c.connected_to:c.user_id);
  const myPendingSent=connections.filter(c=>c.user_id===myProfile?.id&&c.status==="pending").map(c=>c.connected_to);
  const pendingFromOther=connections.filter(c=>c.connected_to===myProfile?.id&&c.status==="pending").map(c=>c.user_id);
  const myReceived=connections.filter(c=>c.connected_to===myProfile?.id&&c.status==="pending");
  const myEndorsed=endorsements.filter(e=>e.user_id===myProfile?.id).map(e=>e.endorsed_id);
  const myBlocks=blocks.filter(b=>b.blocker_id===myProfile?.id).map(b=>b.blocked_id);
  const chatList=profiles.filter(p=>myConns.includes(p.id));
  const totalUnread=Object.values(unread).reduce((a,b)=>a+b,0);

  function connLabel(id){
    if(myConns.includes(id))return "✓ Connected";
    if(myPendingSent.includes(id))return "⏳ Pending";
    if(pendingFromOther.includes(id))return "📨 Accept?";
    return "Send request";
  }
  function connActive(id){return myConns.includes(id)||myPendingSent.includes(id)||pendingFromOther.includes(id);}

  const filtered=profiles.filter(p=>{
    const q=searchQ.toLowerCase();
    const mq=!q||[p.name,p.company,p.role,p.industry,p.city,p.country].some(f=>f?.toLowerCase().includes(q));
    const mc=filterCountry==="All countries"||p.country===filterCountry;
    const mi=filterIndustry==="All industries"||p.industry===filterIndustry;
    const ml=!filterLived||p.lived_lebanon;
    const notMe=!myProfile||p.id!==myProfile.id;
    const modeKey=discoverMode==="all"?"world":discoverMode;
    const mv=!p.visible_in||p.visible_in.length===0||p.visible_in.includes(modeKey)||p.visible_in.includes("world");
    return mq&&mc&&mi&&ml&&notMe&&mv;
  });

  const navItems=[
    {id:"discover",icon:"🔍",label:"Discover"},
    {id:"requests",icon:"📨",label:"Requests",badge:myReceived.length},
    {id:"community",icon:"👥",label:"Community"},
    {id:"messages",icon:"✉️",label:"Messages",badge:totalUnread},
    {id:"myprofile",icon:"🌲",label:"My profile"},
    {id:"feedback",icon:"💬",label:"Feedback"},
  ];

  const modeColor=discoverMode==="all"?"#B91C1C":discoverMode==="pro"?"#1D4ED8":"#166534";
  const modeBg=discoverMode==="all"?"#FEF2F2":discoverMode==="pro"?"#EFF6FF":"#F0FDF4";
  const modeBorder=discoverMode==="all"?"#FECACA":discoverMode==="pro"?"#BFDBFE":"#BBF7D0";

  if(page==="home")return(
    <>
      <HomePage onEnter={()=>{setHasSeenHome(true);setPage("discover");}} onSignup={()=>{setHasSeenHome(true);session?setShowCreate(true):setShowAuth(true);}}/>
      {showAuth&&<AuthScreen onClose={()=>setShowAuth(false)} onAuthed={async (user)=>{
        setShowAuth(false);
        const{data}=await supabase.from("profiles").select("*").order("created_at",{ascending:false});
        if(data){
          setProfiles(data);
          const existing=data.find(p=>p.user_id===user?.id);
          if(!existing) setShowCreate(true);
          else{setHasSeenHome(true);setPage("discover");}
        }
      }}/>}
    </>
  );

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}

      <div className="sidebar">
        <div className="logo-box">
          <div className="logo-name">🌲 MLN</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
            {[["all","🌐","World"],["pro","💼","Pro"],["social","🤝","Social"]].map(([v,ic,lb])=>(
              <div key={v} onClick={()=>setDiscoverMode(v)} style={{padding:"5px 4px",borderRadius:6,textAlign:"center",cursor:"pointer",background:discoverMode===v?(v==="all"?"#FEF2F2":v==="pro"?"#EFF6FF":"#F0FDF4"):"transparent",border:`1px solid ${discoverMode===v?(v==="all"?"#FECACA":v==="pro"?"#BFDBFE":"#BBF7D0"):"transparent"}`,transition:"all .15s"}}>
                <div style={{fontSize:12}}>{ic}</div>
                <div style={{fontSize:9,fontWeight:700,color:discoverMode===v?(v==="all"?"#B91C1C":v==="pro"?"#1D4ED8":"#166534"):"var(--text-3)",marginTop:1}}>{lb}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{flex:1,paddingTop:6}}>
          {navItems.map(n=>(
            <div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>{setPage(n.id);setViewProfile(null);}}>
              <span className="nav-icon">{n.icon}</span><span className="nav-label">{n.label}</span>
              {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          {!session?(
            <button className="btn btn-primary" style={{width:"100%",padding:"9px 0"}} onClick={()=>setShowAuth(true)}>Log in</button>
          ):!myProfile?(
            <button className="btn btn-primary" style={{width:"100%",padding:"9px 0"}} onClick={()=>setShowCreate(true)}>Create profile</button>
          ):(
            <>
              <div className="user-pill" onClick={()=>setPage("myprofile")}>
                <Av initials={myProfile.initials} color={myProfile.color} bg={myProfile.bg} size={30} photoUrl={myProfile.photo_url}/>
                <span className="user-name">{myProfile.name}</span>
              </div>
              <button className="btn btn-sm" style={{width:"100%",marginTop:8}} onClick={logout}>Log out</button>
            </>
          )}
        </div>
      </div>

      <div className="main">

        {page==="discover"&&!viewProfile&&(
          <div className="page">
            <div style={{background:modeBg,border:`1px solid ${modeBorder}`,borderRadius:"var(--r)",padding:"14px 18px",marginBottom:18}}>
              <div style={{fontSize:20,fontWeight:800,letterSpacing:"-1px",color:modeColor,marginBottom:2}}>
                {discoverMode==="all"?"Discover":discoverMode==="pro"?"Pro network":"Social"}
              </div>
              <div style={{fontSize:12,color:"var(--text-2)"}}>
                {discoverMode==="all"?"Find Lebanese people worldwide, for any reason":discoverMode==="pro"?"Work, collaborate, and grow with Lebanese professionals":"Connect beyond work: life, culture, and friendship"}
              </div>
            </div>

            {/* PEOPLE YOU MAY KNOW */}
            {myProfile&&getSuggestions().length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text-3)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>People you may know</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:10}}>
                  {getSuggestions().map(p=>(
                    <div key={p.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"14px",textAlign:"center",cursor:"pointer",transition:"all .15s",position:"relative"}} onClick={()=>setViewProfile(p)}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--red-mid)";e.currentTarget.style.transform="translateY(-1px)"}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="none"}}>
                      <div style={{position:"absolute",top:8,right:8,fontSize:9,color:"var(--text-3)",background:"var(--stone)",padding:"2px 6px",borderRadius:8}}>
                        {p.country===myProfile.country?"Same country":p.industry===myProfile.industry?"Same industry":"Lebanese"}
                      </div>
                      <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><Av initials={p.initials} color={p.color} bg={p.bg} size={44} photoUrl={p.photo_url}/></div>
                      <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{p.name}</div>
                      <div style={{fontSize:11,color:"var(--text-2)",marginBottom:8}}>{[p.city,p.country].filter(Boolean).join(", ")}</div>

                            <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>{setViewProfile(p);setPage("discover");setShowConnections(false);}}>
                              <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                              <div style={{fontSize:11,color:"var(--text-3)"}}>{[p.city,p.country].filter(Boolean).join(", ")}</div>
                            </div>
                            <div style={{display:"flex",gap:5,flexShrink:0}}>
                              {(p.share_email||p.share_phone)&&<button className="btn btn-sm" onClick={()=>setShowContact(p)}>📋</button>}
                              <button className="btn btn-sm" onClick={()=>{openChat(p.id);setPage("messages");setShowConnections(false);}}>✉️</button>
                              <button className="btn btn-sm btn-danger" onClick={()=>sendRequest(p.id)}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {page==="feedback"&&(
          <div className="page-sm">
            <div className="page-title">Get in touch</div>
            <div className="page-sub">Questions, feedback, or just want to say hi</div>
            <div className="card" style={{marginBottom:12}}>
              <div className="section-label">Connect with me on MLN</div>
              <div style={{fontSize:13,color:"var(--text-2)",marginBottom:14,lineHeight:1.6}}>The best way to reach me is right here on the app. Find my profile, send a connection request, and message me directly.</div>
              <button className="btn btn-primary" onClick={()=>{setSearchQ("Pierre Turk");setPage("discover");}}>Find Pierre Turk on MLN →</button>
            </div>
            <div className="card" style={{marginBottom:12}}>
              <div className="section-label">Email</div>
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"6px 0"}}>
                <div style={{fontSize:20}}>✉️</div>
                <div style={{fontSize:13,fontWeight:600}}>pierre.turk@mylebanesenetwork.com</div>
              </div>
            </div>
            <div className="card">
              <div className="section-label">Leave a message</div>
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                {["Feedback","Request","Open message"].map(t=>(
                  <div key={t} className={`chip${feedbackType===t?" on":""}`} onClick={()=>setFeedbackType(t)}>{t}</div>
                ))}
              </div>
              {feedbackSent?(
                <div style={{textAlign:"center",padding:"24px 0"}}>
                  <div style={{fontSize:32,marginBottom:8}}>🙏</div>
                  <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>Thank you!</div>
                  <div style={{fontSize:13,color:"var(--text-2)"}}>We'll get back to you soon.</div>
                  <button className="btn btn-sm" style={{marginTop:14}} onClick={()=>{setFeedbackSent(false);setFeedbackText("");setFeedbackType("Feedback");}}>Send another</button>
                </div>
              ):(
                <>
                  <textarea className="inp" style={{height:100,resize:"vertical",marginBottom:12}} placeholder={feedbackType==="Feedback"?"What could be better, what do you love…":feedbackType==="Request"?"What feature would you like to see…":"Write your message…"} value={feedbackText} onChange={e=>setFeedbackText(e.target.value)}/>
                  <button className="btn btn-primary" disabled={!feedbackText.trim()} onClick={sendFeedback}>Send {feedbackType} →</button>
                </>
              )}
            </div>
          </div>
        )}
      </div>

      {showAuth&&<AuthScreen onClose={()=>setShowAuth(false)} onAuthed={async (user)=>{
    setShowAuth(false);
    // reload profiles fresh so we can find the user's profile immediately
    const{data}=await supabase.from("profiles").select("*").order("created_at",{ascending:false});
    if(data){
      setProfiles(data);
      const existing=data.find(p=>p.user_id===user?.id);
      if(!existing) setShowCreate(true);
    }
  }}/>}

      {showCreate&&(
        <div className="modal-bg">
          <div className="modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div className="modal-title">Create your profile</div>
              <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-3)"}} onClick={()=>setShowCreate(false)}>✕</button>
            </div>
            <div className="modal-sub">Tell the Lebanese community about yourself</div>
            <PhotoUpload preview={photoPreview} onChange={onPhotoSelect} uploading={uploading}/>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">First name *</label><input className="inp" value={form.firstName} onChange={e=>setForm(p=>({...p,firstName:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Last name *</label><input className="inp" value={form.lastName} onChange={e=>setForm(p=>({...p,lastName:e.target.value}))}/></div>
            </div>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">Role</label><input className="inp" placeholder="e.g. Software Engineer" value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Company</label><input className="inp" placeholder="e.g. Google" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))}/></div>
            </div>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">Country</label><input className="inp" placeholder="e.g. France" value={form.country} onChange={e=>setForm(p=>({...p,country:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">City</label><input className="inp" placeholder="e.g. Paris" value={form.city} onChange={e=>setForm(p=>({...p,city:e.target.value}))}/></div>
            </div>
            <div className="form-row"><label className="form-label">Industry</label><select className="inp" value={form.industry} onChange={e=>setForm(p=>({...p,industry:e.target.value}))}>{INDUSTRIES.slice(1).map(i=><option key={i}>{i}</option>)}</select></div>
            <div className="form-row"><label className="form-label">Languages <span style={{color:"var(--text-3)",fontWeight:400,textTransform:"none"}}>comma-separated</span></label><input className="inp" placeholder="Arabic, French, English" value={form.languages} onChange={e=>setForm(p=>({...p,languages:e.target.value}))}/></div>
            <div className="form-row"><label className="form-label">Bio</label><textarea className="inp" style={{height:72,resize:"vertical"}} placeholder="Tell the community about yourself…" value={form.bio} onChange={e=>setForm(p=>({...p,bio:e.target.value}))}/></div>
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Where do you want to appear?</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {[["world","🌐 World"],["pro","💼 Pro"],["social","❤️ Social"]].map(([v,l])=>{
                const on=form.visibleIn.includes(v);
                return <div key={v} className={`chip${on?" on":""}`} onClick={()=>setForm(p=>({...p,visibleIn:on?p.visibleIn.filter(x=>x!==v):[...p.visibleIn,v]}))}>
                  {l}{on?" ✓":""}
                </div>;
              })}
            </div>
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Social profile</div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={form.sameProfileBoth} onChange={e=>setForm(p=>({...p,sameProfileBoth:e.target.checked}))}/> Same profile for Pro and Social
            </label>
            {!form.sameProfileBoth&&<>
              <div className="form-row"><label className="form-label">Social bio</label><textarea className="inp" style={{height:68,resize:"vertical"}} placeholder="Who are you beyond work?" value={form.socialBio} onChange={e=>setForm(p=>({...p,socialBio:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Interests <span style={{color:"var(--text-3)",fontWeight:400,textTransform:"none"}}>comma-separated</span></label><input className="inp" placeholder="Hiking, food, music…" value={form.socialInterests} onChange={e=>setForm(p=>({...p,socialInterests:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Looking for</label><input className="inp" placeholder="Friendships, events…" value={form.socialLookingFor} onChange={e=>setForm(p=>({...p,socialLookingFor:e.target.value}))}/></div>
            </>}
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Contact info (shown only to connections)</div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={form.shareEmail} onChange={e=>setForm(p=>({...p,shareEmail:e.target.checked}))}/> Share my email address
            </label>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={form.sharePhone} onChange={e=>setForm(p=>({...p,sharePhone:e.target.checked}))}/> Share my phone number
            </label>
            {form.sharePhone&&<div className="form-row"><label className="form-label">Phone number</label><input className="inp" placeholder="+33 6 00 00 00 00" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/></div>}
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={form.livedLebanon} onChange={e=>setForm(p=>({...p,livedLebanon:e.target.checked}))}/> I have lived in Lebanon
            </label>
            <button className="btn btn-primary btn-full" onClick={createProfile}>{uploading?"Uploading photo…":"Create my profile →"}</button>
          </div>
        </div>
      )}

      {showEdit&&(
        <div className="modal-bg">
          <div className="modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div className="modal-title">Edit profile</div>
              <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-3)"}} onClick={()=>setShowEdit(false)}>✕</button>
            </div>
            <div className="modal-sub">Update your information</div>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">First name *</label><input className="inp" value={editForm.firstName||""} onChange={e=>setEditForm(p=>({...p,firstName:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Last name *</label><input className="inp" value={editForm.lastName||""} onChange={e=>setEditForm(p=>({...p,lastName:e.target.value}))}/></div>
            </div>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">Role</label><input className="inp" value={editForm.role||""} onChange={e=>setEditForm(p=>({...p,role:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Company</label><input className="inp" value={editForm.company||""} onChange={e=>setEditForm(p=>({...p,company:e.target.value}))}/></div>
            </div>
            <div className="form-grid">
              <div className="form-row"><label className="form-label">Country</label><input className="inp" value={editForm.country||""} onChange={e=>setEditForm(p=>({...p,country:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">City</label><input className="inp" value={editForm.city||""} onChange={e=>setEditForm(p=>({...p,city:e.target.value}))}/></div>
            </div>
            <div className="form-row"><label className="form-label">Industry</label><select className="inp" value={editForm.industry||""} onChange={e=>setEditForm(p=>({...p,industry:e.target.value}))}>{INDUSTRIES.slice(1).map(i=><option key={i}>{i}</option>)}</select></div>
            <div className="form-row"><label className="form-label">Languages</label><input className="inp" value={editForm.languages||""} onChange={e=>setEditForm(p=>({...p,languages:e.target.value}))}/></div>
            <div className="form-row"><label className="form-label">Bio</label><textarea className="inp" style={{height:68,resize:"vertical"}} value={editForm.bio||""} onChange={e=>setEditForm(p=>({...p,bio:e.target.value}))}/></div>
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Where do you want to appear?</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {[["world","🌐 World"],["pro","💼 Pro"],["social","❤️ Social"]].map(([v,l])=>{
                const vi=editForm.visibleIn||["world","pro","social"];
                const on=vi.includes(v);
                return <div key={v} className={`chip${on?" on":""}`} onClick={()=>setEditForm(p=>({...p,visibleIn:on?vi.filter(x=>x!==v):[...vi,v]}))}>
                  {l}{on?" ✓":""}
                </div>;
              })}
            </div>
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Social profile</div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={editForm.sameProfileBoth??true} onChange={e=>setEditForm(p=>({...p,sameProfileBoth:e.target.checked}))}/> Same profile for Pro and Social
            </label>
            {!(editForm.sameProfileBoth??true)&&<>
              <div className="form-row"><label className="form-label">Social bio</label><textarea className="inp" style={{height:68,resize:"vertical"}} value={editForm.social_bio||""} onChange={e=>setEditForm(p=>({...p,social_bio:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Interests</label><input className="inp" value={editForm.socialInterests||""} onChange={e=>setEditForm(p=>({...p,socialInterests:e.target.value}))}/></div>
              <div className="form-row"><label className="form-label">Looking for</label><input className="inp" value={editForm.social_looking_for||""} onChange={e=>setEditForm(p=>({...p,social_looking_for:e.target.value}))}/></div>
            </>}
            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".05em"}}>Contact info sharing</div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={editForm.share_email||false} onChange={e=>setEditForm(p=>({...p,share_email:e.target.checked}))}/> Share my email with connections
            </label>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={editForm.share_phone||false} onChange={e=>setEditForm(p=>({...p,share_phone:e.target.checked}))}/> Share my phone with connections
            </label>
            {editForm.share_phone&&<div className="form-row"><label className="form-label">Phone</label><input className="inp" value={editForm.phone||""} onChange={e=>setEditForm(p=>({...p,phone:e.target.value}))}/></div>}
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={editForm.livedLebanon??editForm.lived_lebanon??false} onChange={e=>setEditForm(p=>({...p,livedLebanon:e.target.checked}))}/> I have lived in Lebanon
            </label>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary" style={{flex:1,padding:"11px 0"}} onClick={saveEdit}>Save changes</button>
              <button className="btn btn-danger" style={{padding:"11px 16px"}} onClick={deleteProfile}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {showContact&&(
        <div className="modal-bg" onClick={()=>setShowContact(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div className="modal-title">Contact info</div>
              <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-3)"}} onClick={()=>setShowContact(null)}>✕</button>
            </div>
            <div className="modal-sub">{showContact.name} has shared the following</div>
            {showContact.share_email&&<div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:"1px solid var(--border)"}}>
              <div style={{fontSize:20}}>✉️</div><div><div style={{fontSize:11,color:"var(--text-3)",textTransform:"uppercase",letterSpacing:".05em"}}>Email</div><div style={{fontWeight:600,fontSize:14}}>{showContact.email}</div></div>
            </div>}
            {showContact.share_phone&&showContact.phone&&<div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0"}}>
              <div style={{fontSize:20}}>📱</div><div><div style={{fontSize:11,color:"var(--text-3)",textTransform:"uppercase",letterSpacing:".05em"}}>Phone</div><div style={{fontWeight:600,fontSize:14}}>{showContact.phone}</div></div>
            </div>}
            {!showContact.share_email&&!showContact.share_phone&&<div style={{color:"var(--text-3)",fontSize:13,padding:"12px 0"}}>This person hasn't shared any contact info yet.</div>}
          </div>
        </div>
      )}

      {showReport&&(
        <div className="modal-bg">
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-title" style={{marginBottom:4}}>Report this user</div>
            <div className="modal-sub">Help us keep My Lebanese Network safe</div>
            <div style={{display:"grid",gap:8}}>
              {["Harassment or abusive language","Spam or scam","Fake profile / impersonation","Inappropriate content","Other"].map(r=>(
                <button key={r} className="btn" style={{textAlign:"left",padding:"10px 14px"}} onClick={()=>reportUser(showReport,r)}>{r}</button>
              ))}
            </div>
            <button className="btn" style={{width:"100%",marginTop:12}} onClick={()=>setShowReport(null)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
